
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Mzantsi Bites - Taste the Heart of Mzansi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        lime: {
                            DEFAULT: 'var(--accent-color, #d9ff00)',
                            500: 'var(--accent-color, #d9ff00)',
                            600: 'var(--accent-color, #d9ff00)',
                        },
                        dark: {
                            DEFAULT: '#000000',
                            card: '#1a1a1a',
                            input: '#262626',
                        }
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-height: 100%;
            --accent-color: #d9ff00;
            --button-text-color: #000000;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        .dark body, .light body {
            background-color: #000000 !important;
            color: #ffffff !important;
        }
        .text-black {
            color: var(--button-text-color, #000000) !important;
        }
        .bg-lime {
            background-color: var(--accent-color, #d9ff00) !important;
        }
        .border-lime {
            border-color: var(--accent-color, #d9ff00) !important;
        }
        .text-lime {
            color: var(--accent-color, #d9ff00) !important;
        }
        .fill-lime {
            fill: var(--accent-color, #d9ff00) !important;
        }
        .shadow-lime\/20 {
            --tw-shadow-color: var(--accent-color, #d9ff00);
            --tw-shadow: 0 20px 25px -5px rgb(var(--tw-shadow-color) / 0.2), 0 8px 10px -6px rgb(var(--tw-shadow-color) / 0.2);
        }
        h1, h2, h3 {
            font-family: 'Playfair+Display', serif;
        }
        /* Custom scrollbar for a cleaner app look */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e5e7eb;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #d1d5db;
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "axios": "https://esm.sh/axios@^1.6.7",
    "crypto-js": "https://esm.sh/crypto-js@^4.2.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-black text-white overflow-x-hidden">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
